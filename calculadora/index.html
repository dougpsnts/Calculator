<!doctype html>
<html lang="pt-br">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="estilo.css">
      
    <title>Calculadora</title>

  </head>

  <body>

    <header>

    </header>

    <main>
      <div id="calculadora">
        <h1>Calculadora</h1>
        <p class="tela"> </p>
          <table class="teclado">
            <tr>
              <td><button class="botaoc">C</button></td>
              <td><button class="botao">Del</button></td>
              <td><button class="botao">÷</button></td>
              <td><button class="botao">x</button></td>
            </tr>
            <tr>
              <td><button class="botao">7</button></td>
              <td><button class="botao">8</button></td>
              <td><button class="botao">9</button></td>
              <td><button class="botao">-</button></td>
            </tr>
            <tr>
              <td><button class="botao">4</button></td>
              <td><button class="botao">5</button></td>
              <td><button class="botao">6</button></td>
              <td><button class="botao">+</button></td>
            </tr>
            <tr>
              <td><button class="botao">1</button></td>
              <td><button class="botao">2</button></td>
              <td><button class="botao">3</button></td>
              <td rowspan="2"><button class="botao" style="height: 105px;">=</button></td>
            </tr>
            <tr>
              <td colspan="2"><button class="botao" style="width: 105px;">0</button></td>
              <td><button class="botao">.</button></td>
            </tr>
          </table>
      </div>

    </main>

  </body>
</html>
